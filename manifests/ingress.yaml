apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-app-ingress
  labels:
    app.kubernetes.io/name: web-app
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-app-service
            port:
              number: 80
